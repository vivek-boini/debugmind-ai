<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Leetcode Code Extractor</title>
    <style>
      body{font-family:Arial,Helvetica,sans-serif;margin:12px;color:#0b1720}
      h1{font-size:16px;margin:0 0 8px}
      button{padding:8px 12px;border-radius:8px;background:#6b5cff;color:#fff;border:none;cursor:pointer}
      p{font-size:13px;color:#333}
    </style>
  </head>
  <body>
    <h1>Leetcode Code Extractor</h1>
    <p>Open your <strong>https://leetcode.com/submissions/</strong> page and click the button to extract submissions.</p>
    <div style="margin-top:10px">
      <button id="openSub">Open Submissions</button>
      <button id="trigger" style="margin-left:8px">Trigger extraction</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
